<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paste2FA</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23d32f2f'/%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='44' font-family='monospace' font-weight='bold' fill='white'%3E2FA%3C/text%3E%3C/svg%3E">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#000;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{width:100%;max-width:440px}
h1{text-align:center;color:#fff;font-size:28px;margin-bottom:32px;letter-spacing:1px}
.card{background:#111;border-radius:16px;padding:28px;margin-bottom:20px;border:1px solid #333}
label{display:block;color:#888;font-size:13px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:600}
.input-row{display:flex;gap:8px;margin-bottom:12px}
.input-row input{flex:1;padding:14px;border:2px solid #333;border-radius:10px;background:#000;color:#eee;font-size:15px;outline:none;transition:border-color .2s}
.input-row input:focus{border-color:#fff}
.input-row input::placeholder{color:#555}
.btn{background:#222;color:#ccc;border:none;border-radius:10px;padding:14px 18px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;white-space:nowrap}
.btn:hover{background:#333;color:#fff}
.btn-submit{background:#d32f2f;color:#fff}
.btn-submit:hover{background:#b71c1c}
.btn-copy{background:#2e7d32;color:#fff}
.btn-copy:hover{background:#1b5e20}
.btn-clear{background:#e0e0e0;color:#222}
.btn-clear:hover{background:#ccc}
.btn-row{display:flex;gap:8px}
.btn-row .btn{flex:1}
.code-display{background:#000;border-radius:12px;padding:24px;text-align:center;margin-bottom:12px;border:2px solid #333;cursor:pointer;transition:border-color .2s}
.code-display:hover{border-color:#fff}
.code-display .digits{font-family:'SF Mono','Fira Code','Courier New',monospace;font-size:52px;font-weight:700;color:#fff;letter-spacing:8px}
.code-display .digits.placeholder{color:#555;font-size:20px;letter-spacing:1px;font-weight:400}
.timer{margin-top:16px}
.timer-text{color:#888;font-size:13px;margin-bottom:6px}
.timer-bar{height:3px;background:#333;border-radius:3px;overflow:hidden}
.timer-bar-fill{height:100%;background:#d32f2f;border-radius:3px;transition:width 1s linear}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;border:1px solid #555}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="container">
  <div style="text-align:center;margin-bottom:24px">
    <span style="color:#888;font-size:15px">⭐️ Please give a star to this <a href="https://github.com/Yesmohsen/Paste2FA" target="_blank" style="color:#888;text-decoration:underline;transition:color .2s" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#888'">Project</a> if you like it</span>
  </div>
  <h1>Paste2FA</h1>

  <div class="card">
    <label>Secret Key</label>
    <div class="input-row">
      <input type="text" id="secretInput" placeholder="Paste your Base32 secret here" spellcheck="false" autocomplete="off">
    </div>
    <div class="btn-row">
      <button class="btn" id="pasteBtn">Paste</button>
      <button class="btn btn-submit" id="submitBtn">Submit</button>
    </div>
    <div class="btn-row" style="margin-top:8px">
      <button class="btn btn-clear" id="clearBtn">Clear</button>
    </div>
  </div>

  <div class="card">
    <label>2FA Code</label>
    <div class="code-display">
      <div class="digits placeholder" id="codeDisplay">Click Submit to generate</div>
      <div class="timer" id="timer" style="display:none">
        <div class="timer-text" id="timerText">Refreshes in 30s</div>
        <div class="timer-bar">
          <div class="timer-bar-fill" id="timerBarFill"></div>
        </div>
      </div>
    </div>
    <div style="text-align:center;color:#555;font-size:13px">Click the code to copy</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const secretInput = document.getElementById('secretInput');
const pasteBtn = document.getElementById('pasteBtn');
const clearBtn = document.getElementById('clearBtn');
const submitBtn = document.getElementById('submitBtn');
const codeDisplay = document.getElementById('codeDisplay');
const toast = document.getElementById('toast');

let currentCode = '';
let secret = '';
let timerInterval = null;

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function startTimer() {
  const timerDiv = document.getElementById('timer');
  const timerText = document.getElementById('timerText');
  const timerBarFill = document.getElementById('timerBarFill');
  timerDiv.style.display = 'block';

  let remaining = 30 - (Math.floor(Date.now() / 1000) % 30);

  async function tick() {
    remaining--;
    timerText.textContent = `Refreshes in ${remaining}s`;
    timerBarFill.style.width = `${(remaining / 30) * 100}%`;

    if (remaining <= 0) {
      timerText.textContent = 'Refreshes in 30s';
      timerBarFill.style.width = '100%';
      remaining = 30;

      if (secret) {
        try {
          const code = await generateTOTP(secret);
          currentCode = code;
          codeDisplay.textContent = code.slice(0, 3) + ' ' + code.slice(3);
          codeDisplay.className = 'digits';
        } catch {}
      }
    }
  }

  clearInterval(timerInterval);
  timerInterval = setInterval(tick, 1000);
  tick();
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  const timerDiv = document.getElementById('timer');
  if (timerDiv) timerDiv.style.display = 'none';
}

// Base32 decode
function base32Decode(str) {
  const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
  str = str.replace(/\s/g, '').replace(/=+$/, '').toUpperCase();
  const bytes = [];
  let bits = 0, value = 0;
  for (const ch of str) {
    const idx = alphabet.indexOf(ch);
    if (idx === -1) continue;
    value = (value << 5) | idx;
    bits += 5;
    if (bits >= 8) {
      bytes.push((value >> (bits - 8)) & 0xff);
      bits -= 8;
    }
  }
  return new Uint8Array(bytes);
}

function isValidBase32(str) {
  const clean = str.replace(/\s/g, '').replace(/=+$/, '').toUpperCase();
  if (clean.length === 0) return false;
  return /^[A-Z2-7]+$/.test(clean) && clean.length >= 16;
}

// Generate TOTP (RFC 6238)
async function generateTOTP(secret) {
  const keyBytes = base32Decode(secret);
  if (keyBytes.length === 0) throw new Error('Invalid secret');

  const epoch = Math.floor(Date.now() / 1000);
  const counter = Math.floor(epoch / 30);

  const counterBuf = new ArrayBuffer(8);
  const counterView = new DataView(counterBuf);
  counterView.setBigUint64(0, BigInt(counter), false);

  const cryptoKey = await crypto.subtle.importKey(
    'raw', keyBytes, { name: 'HMAC', hash: 'SHA-1' },
    false, ['sign']
  );

  const hmac = await crypto.subtle.sign('HMAC', cryptoKey, counterBuf);
  const hmacBytes = new Uint8Array(hmac);

  const offset = hmacBytes[hmacBytes.length - 1] & 0xf;
  const code = ((hmacBytes[offset] & 0x7f) << 24) |
               (hmacBytes[offset + 1] << 16) |
               (hmacBytes[offset + 2] << 8) |
               hmacBytes[offset + 3];

  return String(code % 1000000).padStart(6, ' ');
}

secretInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') submitBtn.click();
});

pasteBtn.addEventListener('click', async () => {
  try {
    const text = await navigator.clipboard.readText();
    secretInput.value = text;
    showToast('Pasted from clipboard');
  } catch {
    showToast('Unable to read clipboard');
  }
});

clearBtn.addEventListener('click', () => {
  secretInput.value = '';
  secret = '';
  currentCode = '';
  secretInput.focus();
  stopTimer();
  codeDisplay.textContent = 'Click Submit to generate';
  codeDisplay.className = 'digits placeholder';
  showToast('Cleared');
});

submitBtn.addEventListener('click', async () => {
  const s = secretInput.value.trim();
  if (!s) {
    showToast('Please enter a secret key');
    return;
  }
  if (!isValidBase32(s)) {
    showToast('Invalid Base32 secret key');
    return;
  }
  secret = s;
  submitBtn.textContent = 'Generating...';
  submitBtn.disabled = true;
  try {
    const code = await generateTOTP(secret);
    currentCode = code;
    codeDisplay.textContent = code.slice(0, 3) + ' ' + code.slice(3);
    codeDisplay.className = 'digits';
    showToast('Code generated');
    startTimer();
  } catch {
    codeDisplay.textContent = 'Invalid secret';
    codeDisplay.className = 'digits placeholder';
    showToast('Invalid secret key');
    secret = '';
    stopTimer();
  }
  submitBtn.textContent = 'Submit';
  submitBtn.disabled = false;
});

codeDisplay.addEventListener('click', async () => {
  if (!currentCode) return;
  try {
    await navigator.clipboard.writeText(currentCode);
    showToast('Copied!');
  } catch {
    showToast('Unable to copy');
  }
});

</script>
</body>
</html>
